<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 de Marzo - Día de la Mujer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="petal-container"></div>

    <main class="content-wrapper">
        <section class="hero-section">
            <div class="glass-card main-card fade-in">
                <p class="date">De: Frank</p>
                <h1 class="main-title">Para: <span class="accent-text">Seleeeeeena</span></h1>
                <p class="intro-text">gracias por hacer de mi mundo un lugar mas rosado &lt;3</p>

                <div class="divider"></div>

                <div class="interactive-area">
                    <button id="reveal-btn" class="glow-button">Tócame c:</button>
                </div>
            </div>

            <div id="message-card" class="glass-card hidden">
                <blockquote class="poem">
                    "¡Gracias! Por hacer de los ultimos meses de mi vida un lugar mas bonito"
                </blockquote>

                <div class="video-container">
                    <iframe id="tribute-video-yt" src="https://www.youtube.com/embed/-1KuP0QTIsU"
                        title="Tributo para Selena" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>
                </div>

                <p class="dedication">Para Selena, con admiración.</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Hecho con amor • 2026</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
